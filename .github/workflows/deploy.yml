name: Deploy Frontend to host

on:
  push:
    branches:
      - main

jobs:
  build_test_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker compose build frontend

      - name: Export Docker Image
        run: docker save b4-interview-frontend:latest | gzip > frontend-image.tar.gz

      - name: Copy Image to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend-image.tar.gz"
          target: "~/b4inteview/b4-interview-frontend/"

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/b4inteview/b4-interview-frontend
            git pull origin main
            docker load -i frontend-image.tar.gz
            docker compose up -d
            rm frontend-image.tar.gz
